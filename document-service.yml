server:
  port: ${SERVER_PORT:8078}

spring:
  application:
    name: document-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mongodb:
    uri: ${MONGO_DOCUMENT_URI:mongodb+srv://Avinash:${MONGO_PASSWORD:avinash}@cluster0.unfgwu0.mongodb.net/product_journey?retryWrites=true&w=majority}
    database: product_journey
  web:
    error:
      include-stacktrace: never

document:
  storage:
    provider: s3   # local | s3
    local-path: /uploads
    s3:
      bucket-name: ${S3_BUCKET_NAME}

aws:
  region: ${AWS_REGION:}
  bucket-name: ${S3_BUCKET_NAME}
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY:}
  sessionToken: ${AWS_SESSION_TOKEN:}
  