spring:
    jackson:
        serialization:
            WRITE_DATES_AS_TIMESTAMPS: false
    main:
        allow-bean-definition-overriding: true
    security:
        user:
            

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus
    endpoint:
        health:
            show-details: always

logging:
    level:
        root: INFO
        org.springframework: INFO

resilience4j:
    circuitbreaker:
        configs:
            default:
                slidingWindowSize: 10
                minimumNumberOfCalls: 5
                failureRateThreshold: 50
                waitDurationInOpenState: 10s
    retry:
        configs:
            default:
                maxAttempts: 3
                waitDuration: 500ms
    bulkhead:
        configs:
            default:
                maxConcurrentCalls: 50
                maxWaitDuration: 0
    ratelimiter:
        configs:
            default:
                limitForPeriod: 10
                limitRefreshPeriod: 60s
                timeoutDuration: 0
