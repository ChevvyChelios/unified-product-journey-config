server:
  port: ${SERVER_PORT:8078}

spring:
  application:
    name: document-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

document:
  storage:
    provider: local   # local | s3
    local-path: /uploads
    s3:
      bucket-name: ${S3_BUCKET_NAME}

aws:
  region: ${AWS_REGION:}
  bucket-name: ${S3_BUCKET_NAME}
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY:}
  session