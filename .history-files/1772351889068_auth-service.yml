server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service

  # data:
  mongodb:
    uri: ${MONGO_AUTH_URI}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000        # 15 min
    refresh-token-expiration: 604800000    # 7 days
    issuer: auth-service
    audience: product-journey-platform

auth:
  refresh:
    rotation-enabled: true